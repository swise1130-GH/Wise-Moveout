<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Operation Wise Family Moveout</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#ffffff;--bg2:#f7f6f3;--bg3:#f0efe9;
  --text:#1a1a1a;--text2:#6b6a66;--text3:#9e9d99;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.2);
  --green:#1D9E75;--green-bg:#E1F5EE;--green-text:#0F6E56;
  --amber-bg:#FAEEDA;--amber-text:#854F0B;
  --red-bg:#FAECE7;--red-text:#993C1D;
  --blue-bg:#E6F1FB;--blue-text:#185FA5;
  --pink-bg:#FBEAF0;--pink-text:#993556;
  --gray-bg:#F1EFE8;--gray-text:#5F5E5A;
  --teal-bg:#E1F5EE;--teal-text:#0F6E56;
  --radius:8px;--radius-lg:12px;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
    --text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
    --border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.22);
    --teal-text:#5DCAA5;
  }
}
body{background:var(--bg3);color:var(--text);min-height:100vh;padding:1rem;}
.header{text-align:center;padding:1.5rem 1rem 1rem;}
.header h1{font-size:22px;font-weight:600;color:var(--text);letter-spacing:-.3px;}
.header p{font-size:13px;color:var(--text2);margin-top:4px;}
.sync-bar{text-align:center;font-size:11px;color:var(--text3);margin:4px 0 12px;min-height:16px;}
.card{background:var(--bg);border-radius:var(--radius-lg);border:0.5px solid var(--border);padding:1rem 1.25rem;margin-bottom:12px;}
.progress-track{height:5px;background:var(--bg3);border-radius:99px;margin:8px 0 1rem;}
.progress-fill{height:100%;background:var(--green);border-radius:99px;transition:width .4s;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
.stat{background:var(--bg2);border-radius:var(--radius);padding:.65rem;text-align:center;}
.stat-num{font-size:20px;font-weight:600;color:var(--text);}
.stat-label{font-size:11px;color:var(--text2);margin-top:2px;}
.phase-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin:0 0 6px;padding:0 2px;}
.tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.tab{padding:6px 14px;border-radius:99px;border:0.5px solid var(--border2);background:transparent;cursor:pointer;font-size:12px;color:var(--text2);font-family:inherit;transition:all .15s;white-space:nowrap;}
.tab.active{background:var(--text);color:var(--bg);border-color:var(--text);}
.tab:hover:not(.active){background:var(--bg2);}
.tab.phase2{border-style:dashed;}
.affirmation{font-size:12px;color:var(--teal-text);font-style:italic;margin-bottom:10px;padding:8px 12px;background:var(--teal-bg);border-radius:var(--radius);border-left:2px solid var(--green);}
.day-title{font-size:17px;font-weight:600;color:var(--text);}
.day-sub{font-size:13px;color:var(--text2);margin-top:3px;line-height:1.5;}
.day-prog{font-size:12px;color:var(--text3);margin-top:4px;margin-bottom:1rem;}
.section{margin-bottom:1rem;}
.sec-label{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text2);margin-bottom:7px;padding-left:2px;}
.task{display:flex;align-items:flex-start;gap:9px;padding:10px 12px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--bg);margin-bottom:5px;position:relative;user-select:none;cursor:grab;}
.task.done{opacity:.38;}
.task.done .task-text{text-decoration:line-through;color:var(--text3);}
.task.drag-over{border-color:var(--green);background:var(--green-bg);}
.cb{width:18px;height:18px;min-width:18px;border-radius:4px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s;cursor:pointer;flex-shrink:0;}
.task.done .cb{background:var(--green);border-color:var(--green);}
.ck{display:none;}
.task.done .ck{display:block;}
.task-body{flex:1;min-width:0;}
.task-text{font-size:13px;color:var(--text);line-height:1.45;}
.task-tip{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.55;padding:5px 8px;background:var(--bg2);border-radius:6px;border-left:2px solid var(--border2);}
.move-toggle{background:none;border:none;cursor:pointer;font-size:11px;color:var(--text3);padding:2px 4px;border-radius:4px;flex-shrink:0;margin-top:1px;line-height:1;font-family:inherit;}
.move-toggle:hover{color:var(--text2);background:var(--bg2);}
.move-row{display:flex;align-items:center;gap:6px;margin-top:6px;}
.move-select{font-size:12px;padding:4px 6px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);font-family:inherit;flex:1;}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:99px;margin-left:5px;font-weight:600;vertical-align:middle;}
.b-urgent{background:var(--red-bg);color:var(--red-text);}
.b-blocker{background:var(--amber-bg);color:var(--amber-text);}
.b-car{background:var(--blue-bg);color:var(--blue-text);}
.b-ashley{background:var(--pink-bg);color:var(--pink-text);}
.b-pending{background:var(--gray-bg);color:var(--gray-text);}
.drag-handle{font-size:12px;color:var(--text3);cursor:grab;padding:0 2px;margin-top:2px;flex-shrink:0;}
.delete-btn{font-size:12px;color:var(--text3);cursor:pointer;padding:0 3px;margin-top:1px;flex-shrink:0;background:none;border:none;font-family:inherit;line-height:1;}
.delete-btn:hover{color:var(--text);}
.warn-banner{background:var(--amber-bg);border-radius:var(--radius);padding:8px 10px;margin-top:6px;}
.warn-banner-title{font-size:11px;font-weight:600;color:var(--amber-text);margin-bottom:3px;}
.warn-banner-text{font-size:11px;color:var(--amber-text);line-height:1.5;margin-bottom:6px;}
.warn-banner-btns{display:flex;gap:6px;flex-wrap:wrap;}
.warn-btn{padding:4px 12px;border-radius:99px;border:0.5px solid var(--amber-text);background:transparent;font-size:11px;cursor:pointer;font-family:inherit;color:var(--amber-text);}
.warn-btn.confirm{background:var(--amber-text);color:white;}
.add-row{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border);}
.add-input{flex:1;font-size:13px;padding:8px 11px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);font-family:inherit;}
.add-input:focus{outline:none;border-color:var(--green);}
.add-btn{padding:8px 14px;border-radius:var(--radius);border:0.5px solid var(--border2);background:transparent;font-size:12px;cursor:pointer;font-family:inherit;color:var(--text);white-space:nowrap;font-weight:500;}
.add-btn:hover{background:var(--bg2);}
.spinner{display:inline-block;width:10px;height:10px;border:1.5px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .6s linear infinite;margin-right:4px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 18px;border-radius:99px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;max-width:90vw;text-align:center;}
.toast.show{opacity:1;}
.day-complete{text-align:center;padding:1.5rem 1rem;background:var(--green-bg);border-radius:var(--radius-lg);margin-top:1rem;}
.day-complete-emoji{font-size:32px;margin-bottom:8px;}
.day-complete-title{font-size:16px;font-weight:600;color:var(--green-text);}
.day-complete-msg{font-size:13px;color:var(--green-text);margin-top:4px;line-height:1.5;}
</style>
</head>
<body>
<div class="header">
  <h1>🚚 Operation Wise Family Moveout</h1>
  <p>April–May 2026 — Two phases, one mission</p>
</div>
<div class="sync-bar" id="sync-bar"><span class="spinner"></span>Loading...</div>
<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;">
    <span style="font-size:13px;color:var(--text2);">Overall progress</span>
    <span style="font-size:12px;color:var(--text3);" id="overall-label">0 of 0</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="overall-bar" style="width:0%"></div></div>

    <div class="stat"><div class="stat-num" id="s-left">0</div><div class="stat-label">Remaining</div></div>
    <div class="stat"><div class="stat-num" id="s-today">0</div><div class="stat-label">This day</div></div>
    <div class="stat"><div class="stat-num" id="s-pct">0%</div><div class="stat-label">Complete</div></div>
  </div>

<div class="card">

  <div class="tabs" id="tabs"></div>

  <div class="day-title" id="day-title"></div>
  <div class="day-sub" id="day-sub"></div>
  <div class="day-prog" id="day-prog"></div>
  <div id="task-list"></div>
</div>
<div class="toast" id="toast"></div>
<script>

  {id:"wed",label:"Wed 4/29",phase:2,title:"Wednesday 4/29 — Arrive at new house",sub:"Phase 2 begins. Car-only until Saturday. Day 1 box open first, walk-in project starts today.",sections:[
    {label:"Arrival",tasks:[
      {id:"we1",text:"Unload Day 1 box first — set up coffee, toiletries, essentials",tip:"This is why you packed it. Don't dig through anything else first."},
      {id:"we2",text:"Do a full walkthrough of the new house before unloading anything",tip:"New construction — note anything that needs attention before furniture arrives Saturday."},
      {id:"we3",text:"Unload tools from F150 — stage in primary walk-in closet area"}
    ]},
    {label:"Internet + TV install — 12pm to 2pm",tasks:[
      {id:"we_net",text:"Be home for internet and TV installation — 12pm to 2pm",tip:"Fixed appointment. Don't schedule anything else during this window.",badge:"urgent"}
    ]},
    {label:"Primary walk-in project — start today",tasks:[
      {id:"we4",text:"Purchase paint for walk-in closet at local hardware store"},
      {id:"we5",text:"Prep and paint walk-in closet — first coat",tip:"First coat today means second coat Thursday. Shelving goes in only after paint is fully dry."}
    ]},
    {label:"Appliance delivery — pending confirmation",tasks:[
      {id:"we6",text:"Confirm fridge and washer/dryer delivery window",tip:"Delivery is awaiting confirmation. Follow up if you haven't heard.",badge:"pending"},
      {id:"we7",text:"Be available for appliance delivery if scheduled today",badge:"pending"}
    ]},
    {label:"Logistics",tasks:[
      {id:"we8",text:"Confirm cleaner has access at old house this morning",badge:"urgent"},
      {id:"we9",text:"Cancel Ring camera subscription at old address",badge:"urgent"},
      {id:"we10",text:"Confirm Saturday mover delivery window at new address"}
    ]}
  ]},
  {id:"thu",label:"Thu 4/30",phase:2,title:"Thursday 4/30 — Projects, utilities, setup planning",sub:"Your clearest thinking day before the truck arrives. Use it well.",sections:[
    {label:"Walk-in closet project",tasks:[
      {id:"th1",text:"Paint walk-in closet — second coat",tip:"Let it dry fully before shelving goes in. Don't rush this."},
      {id:"th2",text:"Purchase shelving materials while paint is drying"},
      {id:"th3",text:"Install shelving once paint is fully dry"}
    ]},
    {label:"Appliance delivery — if not Wednesday",tasks:[
      {id:"th5",text:"Be available for fridge and washer/dryer delivery if scheduled today",badge:"pending"}
    ]},
    {label:"Utilities",tasks:[
      {id:"th6",text:"Transfer or set up utilities at new address",tip:"New construction — you'll have received utility info at closing. Electric, gas, water."},
      {id:"th7",text:"Set up internet account if not handled at installation"}
    ]},
    {label:"Room setup priority — decide before the truck arrives",tasks:[
      {id:"th8",text:"As a family, decide which rooms to set up first on Saturday",tip:"Four questions: (1) Where does everyone sleep Saturday night? → Primary bedroom first. (2) What do you need Sunday morning? → Kitchen second. (3) What causes most chaos if unsorted? → Kids rooms and bathrooms next. (4) What can live in boxes another week? → Office, loft, guest spaces. Write the order down so movers can be directed clearly."}
    ]},
    {label:"Saturday planning",tasks:[
      {id:"th9",text:"Make a plan for the dogs during Saturday truck unloading",tip:"Dogs + movers + open front door = chaos. Decide now: back room, neighbor, or crate. Don't leave this for Saturday morning.",badge:"urgent"}
    ]}
  ]},
  {id:"fri",label:"Fri 5/1",phase:2,title:"Friday 5/1 — Last prep before movers",sub:"Movers arrive tomorrow. Get the house ready to receive them.",sections:[
    {label:"Movers food — plan today, execute tomorrow",tasks:[
      {id:"fri1",text:"Plan and prep food for the moving crew arriving Saturday",tip:"Movers work hard. Water, snacks, and lunch go a long way. Plan it today so Saturday morning is calm."},
      {id:"fri2",text:"Buy any food and drinks for the movers if not already done"}
    ]},
    {label:"Final prep",tasks:[
      {id:"fri3",text:"Do a walkthrough — decide exactly where key furniture pieces go",tip:"Have a clear answer for: couch, bed frames, dining table, dressers. Movers will ask and will wait while you decide."},
      {id:"fri4",text:"Clear pathways in the new house for movers to work efficiently",tip:"Move any boxes or supplies away from doorways and main hallways."},
      {id:"fri5",text:"Confirm movers have correct address and your cell number",badge:"urgent"},
      {id:"fri6",text:"Confirm mover arrival time for Saturday morning",badge:"urgent"}
    ]}
  ]},
  {id:"sat2",label:"Sat 5/2",phase:2,title:"Saturday 5/2 — Movers arrive, truck unloads",sub:"The truck is here. Direct traffic, protect the dogs, and welcome your stuff home.",sections:[
    {label:"Before movers start",tasks:[
      {id:"s2_1",text:"Dogs secured before movers arrive — back room, neighbor, or crate",tip:"Decided Thursday. Execute now. Don't improvise this on a busy morning.",badge:"urgent"},
      {id:"s2_2",text:"Have room priority list visible and ready to reference",tip:"You decided this Thursday. Now hand it to the person directing movers."},
      {id:"s2_3",text:"Have food and water ready for the crew",tip:"Set it up before they arrive so it's just there."}
    ]},
    {label:"While movers work",tasks:[
      {id:"s2_4",text:"One person directs movers at the door — everyone else places boxes in rooms"},
      {id:"s2_5",text:"Direct primary bedroom setup first so sleeping is sorted"},
      {id:"s2_6",text:"Direct kitchen boxes to kitchen — unboxing can happen after movers leave"},
      {id:"s2_7",text:"Walk through with movers before they leave — anything damaged or missing?",badge:"urgent"}
    ]},
    {label:"End of day",tasks:[
      {id:"s2_8",text:"Primary bedroom fully functional before bed — bed made, essentials unpacked"},
      {id:"s2_9",text:"Kitchen functional enough for coffee and breakfast tomorrow"},
      {id:"s2_10",text:"Take a breath. Operation Wise Family Moveout is complete. 🏡"}
    ]}
  ]}
];

const WARNINGS={
  f1:"Wardrobe boxes are a blocker for Sunday's primary walk-in pack. Moving this later means the closet may not get packed on time.",
  su1:"This task requires wardrobe boxes (today's blocker task). Make sure those are purchased first.",
  su5:"The mirror is fragile and needs careful movers handling.",
  mo0:"Ashley's Hope Heals run is time-sensitive — 10am to 1pm Monday. Moving this may mean missing the drop-off window.",
  mo9:"Lazy Boy and appliance check-ins should happen before Tuesday so the delivery plan is confirmed.",
  mo10:"Confirm appliance delivery before mover day.",
  tu23:"Canceling water is time-sensitive. Should happen on or before Tuesday departure.",
  we8:"Confirm cleaner access on Wednesday morning — this is time-sensitive.",
  we9:"Cancel Ring only after you've left the old house.",
  tu5:"The Day 1 box must be loaded before movers arrive — goes in the Explorer, not on the truck.",
  we_net:"Internet and TV install is a fixed appointment 12–2pm Wednesday. This cannot move.",
  th9:"Dog plan for Saturday should be decided before the truck arrives.",
  fri5:"Movers need your number before they arrive Saturday.",
  fri6:"Confirm mover arrival time today so Saturday morning isn't scrambled."
};

DAYS.forEach(d=>d.sections.forEach(s=>s.tasks.forEach(t=>{
  taskMap[t.id]={done:false,day:d.id,task:t};
})));

function setSyncBar(msg,spinning){
  document.getElementById("sync-bar").innerHTML=spinning?`<span class="spinner"></span>${msg}`:msg;
}

let toastTimeout=null;
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  clearTimeout(toastTimeout);
  toastTimeout=setTimeout(()=>t.classList.remove("show"),3200);
}

function getNextPraise(){return TASK_PRAISE[(praiseIdx++)%TASK_PRAISE.length];}

function applyState(saved){
  if(!saved)return;
  if(saved.taskMap)Object.keys(saved.taskMap).forEach(k=>{
    if(taskMap[k]){taskMap[k].done=saved.taskMap[k].done||false;taskMap[k].day=saved.taskMap[k].day||taskMap[k].day;}
  });
  if(saved.customTasks)customTasks=saved.customTasks||{};
}

function loadFromLocal(){
  try{applyState(JSON.parse(localStorage.getItem("wise-local")||"{}"));}catch(e){}
}

function getPayload(){
  return{
    taskMap:Object.fromEntries(Object.entries(taskMap).map(([k,v])=>([k,{done:v.done,day:v.day}]))),
    customTasks
  };
}

function saveToLocal(){
  try{localStorage.setItem("wise-local",JSON.stringify(getPayload()));}catch(e){}
}

async function initBin(){
  if(BIN_ID){
    try{
      const res=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{headers:{"X-Master-Key":API_KEY}});
      if(res.ok){
        const data=await res.json();
        applyState(data.record);
        setSyncBar("Synced — live across all devices");
        renderAll();return;
      }
    }catch(e){}
  }
  try{
    const res=await fetch("https://api.jsonbin.io/v3/b",{
      method:"POST",
      headers:{"Content-Type":"application/json","X-Master-Key":API_KEY,"X-Bin-Name":BIN_NAME,"X-Bin-Private":"false"},
      body:JSON.stringify(getPayload())
    });
    if(res.ok){
      const data=await res.json();
      BIN_ID=data.metadata.id;
      localStorage.setItem("wise-bin-id",BIN_ID);
      setSyncBar("Synced — live across all devices");
      renderAll();return;
    }
  }catch(e){}
  setSyncBar("Offline — saved locally only");
  renderAll();
}

async function saveState(){
  saveToLocal();
  if(!BIN_ID){setSyncBar("Saved locally");return;}
  setSyncBar("Saving...",true);
  try{
    const res=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{
      method:"PUT",
      headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},
      body:JSON.stringify(getPayload())
    });
    if(res.ok)setSyncBar("Saved "+new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})+" — synced to all devices");
    else setSyncBar("Sync issue — saved locally");
  }catch(e){setSyncBar("Offline — saved locally");}
}

function scheduleSave(){clearTimeout(saveTimeout);saveTimeout=setTimeout(saveState,800);}

function allTasks(){
  return[...Object.values(taskMap),...Object.values(customTasks).map(t=>({done:t.done,day:t.day,task:t}))];
}
function dayTasksFor(id){return allTasks().filter(t=>t.day===id);}
function dayDone(id){return dayTasksFor(id).filter(t=>t.done).length;}
function dayTotal(id){return dayTasksFor(id).length;}

function updateStats(){
  const all=allTasks(),done=all.filter(t=>t.done).length,total=all.length,left=total-done,pct=total?Math.round(done/total*100):0;
  document.getElementById("overall-bar").style.width=pct+"%";
  document.getElementById("overall-label").textContent=done+" of "+total;
  document.getElementById("s-done").textContent=done;
  document.getElementById("s-left").textContent=left;
  document.getElementById("s-today").textContent=dayTotal(activeDay);
  document.getElementById("s-pct").textContent=pct+"%";
  document.getElementById("day-prog").textContent=dayDone(activeDay)+" of "+dayTotal(activeDay)+" tasks done today";
}

function renderTabs(){
  const el=document.getElementById("tabs");
  let p1="",p2="";
  DAYS.forEach(d=>{
    const done=dayDone(d.id),total=dayTotal(d.id);
    const chk=done===total&&total>0?" ✓":"";
    const cls="tab"+(d.id===activeDay?" active":"")+(d.phase===2?" phase2":"");
    const btn=`<button class="${cls}" onclick="setDay('${d.id}')">${d.label}${chk}</button>`;
    if(d.phase===1)p1+=btn;else p2+=btn;
  });
  el.innerHTML=p1+`<span style="font-size:11px;color:var(--text3);padding:6px 4px;white-space:nowrap;">→ new house</span>`+p2;
  const activeDay_obj=DAYS.find(d=>d.id===activeDay);
  document.getElementById("phase-label").textContent=activeDay_obj&&activeDay_obj.phase===2?"Phase 2 — New house":"Phase 1 — Move out";
}

function getBadge(badge){
  if(!badge)return"";
  const map={urgent:"b-urgent",blocker:"b-blocker",car:"b-car",ashley:"b-ashley",pending:"b-pending"};
  const labels={urgent:"important",blocker:"blocker",car:"goes in car",ashley:"Ashley",pending:"pending"};
  return`<span class="badge ${map[badge]||""}">${labels[badge]||badge}</span>`;
}

function getMoveOptions(currentDay){
  return`<option value="">Move to day...</option>`+DAYS.filter(d=>d.id!==currentDay).map(d=>`<option value="${d.id}">${d.label}</option>`).join("");
}

function getWarnMsg(id){
  if(WARNINGS[id])return WARNINGS[id];
  const entry=taskMap[id]||customTasks[id];
  const t=entry?.task||entry;
  if(!t)return null;
  if(t.badge==="blocker")return"This is a blocker — other tasks depend on it being done first.";
  if(t.badge==="urgent")return"This task is marked important. Make sure the new day still gives enough time to act.";
  if(t.badge==="car")return"This is tied to the car loading plan — must happen before Tuesday departure.";
  if(t.badge==="ashley")return"This is Ashley's task — may conflict with her Hope Heals window Monday 10am–1pm.";
  return null;
}

function toggleMove(id){
  expandedMove[id]=!expandedMove[id];
  renderTasks();
}

function handleMoveSelect(id,selectEl){
  const targetDay=selectEl.value;
  if(!targetDay)return;
  const msg=getWarnMsg(id);
  if(msg){
    warnState={id,targetDay,msg};
  }else{
    doMove(id,targetDay);
    delete expandedMove[id];
  }
  renderTasks();
}

function doMove(id,targetDay){
  if(taskMap[id])taskMap[id].day=targetDay;
  else if(customTasks[id])customTasks[id].day=targetDay;
  warnState=null;
  delete expandedMove[id];
  renderAll();scheduleSave();
}

function confirmMove(){
  if(warnState)doMove(warnState.id,warnState.targetDay);
}

function cancelWarn(){warnState=null;renderTasks();}

function renderTasks(){
  const day=DAYS.find(d=>d.id===activeDay);
  document.getElementById("affirmation").textContent=AFFIRMATIONS[activeDay]||"";
  document.getElementById("day-title").textContent=day.title;
  document.getElementById("day-sub").textContent=day.sub;
  const list=document.getElementById("task-list");
  const dd=dayDone(activeDay),dt=dayTotal(activeDay);

  if(dd===dt&&dt>0){
    const dc=DAY_COMPLETE[activeDay]||"Day complete.";
    const parts=dc.split("\n");
    const emoji=parts[0].match(/\p{Emoji_Presentation}/gu)?.[0]||"🎉";
    const title=parts[0].replace(/\p{Emoji_Presentation}/gu,"").trim();
    list.innerHTML=`<div class="day-complete">
      <div class="day-complete-emoji">${emoji}</div>
      <div class="day-complete-title">${title}</div>
      ${parts[1]?`<div class="day-complete-msg">${parts[1]}</div>`:""}
    </div>`;
    return;
  }

  const originalIds=day.sections.flatMap(s=>s.tasks.map(t=>t.id));
  const sectionsOut=[];
  day.sections.forEach(s=>{
    const tasks=s.tasks.filter(t=>taskMap[t.id]&&taskMap[t.id].day===activeDay);
    if(tasks.length>0)sectionsOut.push({label:s.label,tasks});
  });
  const movedIn=Object.values(taskMap).filter(t=>t.day===activeDay&&!originalIds.includes(t.task.id));
  const customIn=Object.values(customTasks).filter(t=>t.day===activeDay);
  if(movedIn.length>0||customIn.length>0){
    sectionsOut.push({label:"Added to this day",tasks:[...movedIn.map(t=>t.task),...customIn]});
  }

  list.innerHTML=sectionsOut.map(s=>`
    <div class="section">
      <div class="sec-label">${s.label}</div>
      ${s.tasks.map(t=>{
        const st=taskMap[t.id]||customTasks[t.id];
        const isDone=st?st.done:false;
        const isWarn=warnState&&warnState.id===t.id;
        const isExpanded=expandedMove[t.id];
        const isCustom=!!customTasks[t.id];
        return`<div class="task${isDone?" done":""}" id="task-${t.id}" draggable="true"
          ondragstart="onDragStart('${t.id}')"
          ondragover="onDragOver(event,'${t.id}')"
          ondragleave="onDragLeave('${t.id}')"
          ondrop="onDrop(event,'${t.id}')">
          <div class="drag-handle">⠿</div>
          <div class="cb" onclick="toggle('${t.id}')">
            <svg class="ck" width="10" height="10" viewBox="0 0 10 10" fill="none">
              <polyline points="1.5,5 4,7.5 8.5,2" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="task-body">
            <div class="task-text">${t.text}${getBadge(t.badge)}</div>
            ${t.tip?`<div class="task-tip">💡 ${t.tip}</div>`:""}
            ${isWarn?`<div class="warn-banner">
              <div class="warn-banner-title">⚠ Heads up before moving this</div>
              <div class="warn-banner-text">${warnState.msg}</div>
              <div class="warn-banner-btns">
                <button class="warn-btn confirm" onclick="confirmMove()">Move it anyway</button>
                <button class="warn-btn" onclick="cancelWarn()">Keep here</button>
              </div>
            </div>`:""}
            ${!isWarn&&isExpanded?`<div class="move-row">
              <select class="move-select" onchange="handleMoveSelect('${t.id}',this)">${getMoveOptions(activeDay)}</select>
            </div>`:""}
          </div>
          <button class="move-toggle" onclick="toggleMove('${t.id}')" title="Move to another day">${isExpanded?"✕":"↗"}</button>
          ${isCustom?`<button class="delete-btn" onclick="deleteCustom('${t.id}')" title="Remove">✕</button>`:""}
        </div>`;
      }).join("")}
    </div>`).join("")||`<div style="text-align:center;padding:2rem;color:var(--text3);font-size:13px;">All tasks moved to other days.</div>`;

  list.innerHTML+=`
    <div class="add-row">
      <input class="add-input" id="add-input-${activeDay}" type="text" placeholder="Add a task to ${day.label}..." onkeydown="if(event.key==='Enter')addTask('${activeDay}')"/>
      <button class="add-btn" onclick="addTask('${activeDay}')">+ Add</button>
    </div>`;
}

function toggle(id){
  const wasAlreadyDone=(taskMap[id]||customTasks[id])?.done;
  if(taskMap[id])taskMap[id].done=!taskMap[id].done;
  else if(customTasks[id])customTasks[id].done=!customTasks[id].done;
  const isNowDone=(taskMap[id]||customTasks[id])?.done;
  if(isNowDone&&!wasAlreadyDone){
    const dd=dayDone(activeDay),dt=dayTotal(activeDay);
    if(dd<dt)showToast(getNextPraise());
  }
  renderAll();scheduleSave();
}

function addTask(dayId){
  const input=document.getElementById("add-input-"+dayId);
  if(!input)return;
  const text=input.value.trim();
  if(!text)return;
  const newId="custom-"+Date.now();
  customTasks[newId]={id:newId,text,day:dayId,done:false};
  input.value="";
  renderAll();scheduleSave();
}

function deleteCustom(id){delete customTasks[id];renderAll();scheduleSave();}
function setDay(id){activeDay=id;warnState=null;expandedMove={};renderAll();}
function renderAll(){renderTabs();renderTasks();updateStats();}

function onDragStart(id){dragId=id;}
function onDragOver(e,id){e.preventDefault();if(id!==dragId){const el=document.getElementById("task-"+id);if(el)el.classList.add("drag-over");}}
function onDragLeave(id){const el=document.getElementById("task-"+id);if(el)el.classList.remove("drag-over");}
function onDrop(e,targetId){
  e.preventDefault();
  document.querySelectorAll(".drag-over").forEach(el=>el.classList.remove("drag-over"));
  if(!dragId||dragId===targetId){dragId=null;return;}
  const srcDay=(taskMap[dragId]||customTasks[dragId])?.day;
  const tgtDay=(taskMap[targetId]||customTasks[targetId])?.day;
  if(!tgtDay||srcDay===tgtDay){dragId=null;return;}
  const msg=getWarnMsg(dragId);
  if(msg){warnState={id:dragId,targetDay:tgtDay,msg};renderTasks();}
  else{doMove(dragId,tgtDay);}
  dragId=null;
}

loadFromLocal();
renderAll();
initBin();
</script>
</body>
</html>
